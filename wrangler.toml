name = "intima-exclusive-api"
main = "worker/index.js"
compatibility_date = "2026-04-14"
workers_dev = true

[vars]
ENVIRONMENT = "production"
# Lista separada por comas de orígenes permitidos por CORS.
# El API se sirve desde api.intimaexclusive.com para que las cookies
# sean same-site con el frontend (intimaexclusive.com).
ALLOWED_ORIGINS = "https://intimaexclusive.com,https://www.intimaexclusive.com"

# Newsletter / Resend
RESEND_FROM = "Íntima Exclusive <info@intimaexclusive.com>"
NEWSLETTER_WELCOME_PERCENT = "10"
NEWSLETTER_WELCOME_EXPIRA_DIAS = "30"

# ADMIN_TOKEN, RESEND_API_KEY, PAGES_DEPLOY_HOOK, WOMPI_* son secrets:
#   npx wrangler secret put <NOMBRE>

[[d1_databases]]
binding = "DB"
database_name = "intima-exclusive-db"
database_id = "5834bd47-d068-411d-b551-0b94602e7f73"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "intima-exclusive-images"

# ======================================
# Entorno de desarrollo local
# npm run dev:worker          -> D1/R2 locales (aislados)
# npm run dev:worker:remote   -> D1/R2 reales
# ======================================
[env.dev]
name = "intima-exclusive-api-dev"

[env.dev.vars]
ENVIRONMENT = "development"
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:4173"
# Token de admin para dev local (solo local, NUNCA commits con valor real de producción)
ADMIN_TOKEN = "dev-local-token-change-me"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "intima-exclusive-db"
database_id = "5834bd47-d068-411d-b551-0b94602e7f73"

[[env.dev.r2_buckets]]
binding = "IMAGES"
bucket_name = "intima-exclusive-images"
