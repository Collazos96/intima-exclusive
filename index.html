<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7B1A2E" />

    <!-- Google Search Console verification
         Setea VITE_GSC_VERIFICATION en Pages env vars. Ejemplo valor:
         abc123_defg-456_hij789kl -->
    %VITE_GSC_META%

    <link rel="icon" type="image/png" href="https://images.intimaexclusive.com/logo-intima.png" />
    <link rel="apple-touch-icon" href="https://images.intimaexclusive.com/logo-intima.png" />

    <link rel="preconnect" href="https://images.intimaexclusive.com" crossorigin />
    <link rel="preconnect" href="https://api.intimaexclusive.com" crossorigin />

    <!-- Fuentes editoriales para diseños demo -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Inter:wght@300;400;500;600&display=swap" />

    <title>Íntima Exclusive — Lencería femenina premium hecha en Colombia</title>
    <meta name="description" content="Lencería íntima premium hecha con amor en Colombia. Sets, corsets, bodys y accesorios. Tallas S a XL. Envío discreto a todo el país, cambios hasta 30 días." />
    <!-- Canonical dinámico por ruta vía componente <Seo /> (React 19 metadata hoisting) -->
    <!-- NO agregar canonical estático aquí; sobreescribiría el canonical dinámico si el bot lee el HTML antes del JS -->

    <!-- Organization schema estático para que bots sin-JS (WhatsApp, Perplexity, CCBot) lo indexen -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Íntima Exclusive",
      "url": "https://intimaexclusive.com",
      "logo": {
        "@type": "ImageObject",
        "url": "https://images.intimaexclusive.com/LOGO-INTIMA.jpg"
      },
      "description": "Lencería íntima premium hecha con amor en Colombia. Sets, corsets, bodys y accesorios. Tallas S a XL.",
      "areaServed": { "@type": "Country", "name": "Colombia" },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+57-302-855-6022",
        "contactType": "customer service",
        "areaServed": "CO",
        "availableLanguage": ["es"]
      },
      "sameAs": [
        "https://www.instagram.com/intima_exclusive"
      ]
    }
    </script>

    <meta property="og:site_name" content="Íntima Exclusive" />
    <meta property="og:locale" content="es_CO" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Íntima Exclusive — Lencería femenina premium" />
    <meta property="og:description" content="Lencería íntima premium hecha con amor en Colombia. Envío discreto." />
    <meta property="og:image" content="https://images.intimaexclusive.com/LOGO-INTIMA.jpg" />
    <meta property="og:url" content="https://intimaexclusive.com/" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Íntima Exclusive — Lencería femenina premium" />
    <meta name="twitter:description" content="Lencería íntima premium hecha con amor en Colombia. Envío discreto." />
    <meta name="twitter:image" content="https://images.intimaexclusive.com/LOGO-INTIMA.jpg" />
    <!--app-head-->
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <!--app-state-->
    <script type="module" src="/src/entry-client.jsx"></script>
  </body>
</html>
